services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: docker
      LOG_LEVEL: INFO
      DATABASE_URL: sqlite+aiosqlite:////app/data/me1ody.db
      CORS_ORIGINS: '["http://localhost:8080","http://127.0.0.1:8080"]'
      EMBEDDING_BACKEND: hash
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
      - hf-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  backend-data:
  hf-cache:
